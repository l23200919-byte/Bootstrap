<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mapa con coordenadas específicas</title>
<!-- Bootstrap 5: Se importa desde CDN para usar estilos predefinidos -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    /* Estilo para el iframe (mapa) */
    iframe {
        width: 100%;            /* Ocupa todo el ancho del contenedor */
        height: 450px;          /* Altura fija del mapa */
        border: 0;              /* Sin borde */
        border-radius: 10px;    /* Bordes redondeados */
    }
</style>
</head>

<!-- Clase de Bootstrap para fondo gris claro -->
<body class="bg-light">

    <!-- Contenedor principal con margen vertical -->
    <div class="container my-5">

        <!-- Título centrado con margen inferior -->
        <h2 class="text-center mb-4"> Ubicación personalizada en Google Maps</h2>

        <!-- Tarjeta (card) de Bootstrap con sombra -->
        <div class="card shadow-sm">

            <!-- Cuerpo de la tarjeta -->
            <div class="card-body">

                <!-- Texto descriptivo en color gris -->
                <p class="text-muted">
                    Este mapa muestra la ubicación centrada en las coordenadas:
                </p>

                <!-- Lista de coordenadas -->
                <ul>
                    <li>
                        <strong>Latitud:</strong> 20°03'53.4"N (≈ 20.064853)
                    </li>
                    <li>
                        <strong>Longitud:</strong> 98°43'51.0"O (≈ -98.730822)
                    </li>
                </ul>

                <!-- Mapa de Google incrustado usando iframe -->
                <iframe 
                    src="https://www.google.com/maps?q=20.064853,-98.730822&z=15&output=embed" 
                    allowfullscreen   <!-- Permite pantalla completa -->
                    loading="lazy">  <!-- Carga diferida para mejor rendimiento -->
                </iframe>

            </div>
        </div>
    </div>

</body>
</html>
